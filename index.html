<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💖 Para ti 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;

    background: url('https://cincuentaytrescuarentaynueve.com/wp-content/uploads/2024/11/EDM_D2_001-1152x1536.jpeg') no-repeat center center/cover;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
    left: 0;
}

.container {
    position: relative;
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 20px;
    z-index: 1;
}

#startBtn {
    font-size: 22px;
    padding: 20px 40px;
    background: #ff4b7d;
    color: white;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.1);}
    100% {transform: scale(1);}
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    margin: 10px;
    cursor: pointer;
}

#yes {
    background: #ff4b7d;
    color: white;
}

#no {
    background: gray;
}

.heart {
    position: absolute;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- AUDIOS -->
<audio id="music1" loop>
    <source src="https://drive.google.com/uc?export=download&id=1oz35_TNlVlrW9miyUgBuca2mzY1ktBxm" type="audio/mpeg">
</audio>

<audio id="music2" loop>
    <source src="https://drive.google.com/uc?export=download&id=1JPSRypxPv8BqW82X5HB-y-5ABTKYY62q" type="audio/mpeg">
</audio>

<div class="container" id="main">
    <button id="startBtn">💖 Toca aquí 💖</button>
</div>

<script>
const main = document.getElementById("main");
const music1 = document.getElementById("music1");
const music2 = document.getElementById("music2");

document.getElementById("startBtn").addEventListener("click", () => {

    music1.play();

    main.innerHTML = `
        <h1>¿Quieres ser mi novia? 💖</h1>
        <button id="yes">Sí 💕</button>
        <button id="no">No 😢</button>
    `;

    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");

    let scale = 1;

    noBtn.addEventListener("click", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        noBtn.style.position = "absolute";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        scale -= 0.15;
        if (scale > 0) {
            noBtn.style.transform = "scale(" + scale + ")";
        } else {
            noBtn.style.display = "none";
        }
    });

    yesBtn.addEventListener("click", () => {

        music1.pause();
        music2.currentTime = 0;
        music2.play();

        main.innerHTML = `
            <h1>💖 Gracias corazón 💖</h1>
            <p>
            Prometo siempre estar para ti, en cada momento,<br>
            para siempre y por siempre,<br><br>
            <b>TE AMO MI NENA ❤️</b><br><br>
            Eres tú &lt;3
            </p>
        `;
    });
});

// corazones
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
